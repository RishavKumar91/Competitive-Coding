<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;500;700;900&display=swap');

  :root {
    --bg: #080d12;
    --surface: #0d1520;
    --surface2: #111d2e;
    --border: #1a2d45;
    --buy: #00e676;
    --sell: #ff3d57;
    --accent: #00b4d8;
    --gold: #ffd166;
    --text: #c9d8e8;
    --dim: #4a6080;
    --match: #f72585;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    padding: 0;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #0a1628 0%, #0d1f38 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--buy));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .header-title { font-family: 'Barlow Condensed', sans-serif; }
  .header-title h1 { font-size: 22px; font-weight: 900; color: white; letter-spacing: 1px; }
  .header-title p  { font-size: 11px; color: var(--dim); letter-spacing: 2px; text-transform: uppercase; }
  .dsa-badges { margin-left: auto; display: flex; gap: 8px; flex-wrap: wrap; }
  .badge {
    background: rgba(0,180,216,0.1);
    border: 1px solid rgba(0,180,216,0.3);
    color: var(--accent);
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 10px;
    letter-spacing: 1px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 500;
  }

  /* Layout */
  .main { display: grid; grid-template-columns: 340px 1fr; gap: 0; height: calc(100vh - 73px); }

  /* Left panel - Controls */
  .panel-left {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .panel-section { padding: 16px; border-bottom: 1px solid var(--border); }
  .panel-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700;
    color: var(--dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* Form */
  .form-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; flex: 1; }
  .form-group label { font-size: 10px; color: var(--dim); letter-spacing: 1px; }
  .form-group select, .form-group input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 10px;
    border-radius: 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .form-group select:focus, .form-group input:focus {
    border-color: var(--accent);
  }
  .btn-group { display: flex; gap: 8px; margin-top: 4px; }
  .btn {
    flex: 1; padding: 10px; border: none; border-radius: 6px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 14px; letter-spacing: 1px;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-buy  { background: var(--buy);  color: #000; }
  .btn-sell { background: var(--sell); color: #fff; }
  .btn-buy:hover  { background: #00ff88; transform: translateY(-1px); box-shadow: 0 4px 15px rgba(0,230,118,0.4); }
  .btn-sell:hover { background: #ff1f3d; transform: translateY(-1px); box-shadow: 0 4px 15px rgba(255,61,87,0.4); }
  .btn-cancel { background: var(--surface2); border: 1px solid var(--border); color: var(--dim); }
  .btn-cancel:hover { border-color: var(--sell); color: var(--sell); }
  .btn-scenario {
    background: linear-gradient(135deg, rgba(0,180,216,0.2), rgba(0,180,216,0.05));
    border: 1px solid rgba(0,180,216,0.3);
    color: var(--accent);
    width: 100%; margin-bottom: 6px; padding: 9px;
    font-size: 12px;
  }
  .btn-scenario:hover { background: rgba(0,180,216,0.3); }

  /* Log */
  .log-panel { flex: 1; overflow-y: auto; padding: 12px 16px; }
  .log-entry {
    font-size: 11px; padding: 5px 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    line-height: 1.5;
    animation: fadeIn 0.3s ease;
  }
  .log-time { color: var(--dim); margin-right: 8px; }
  .log-trade  { color: var(--gold); }
  .log-buy    { color: var(--buy); }
  .log-sell   { color: var(--sell); }
  .log-cancel { color: var(--sell); opacity: 0.7; }
  .log-info   { color: var(--dim); }
  @keyframes fadeIn { from { opacity: 0; transform: translateX(-4px); } to { opacity: 1; transform: translateX(0); } }

  /* Right panel */
  .panel-right {
    display: flex; flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  /* Ticker bar */
  .ticker-bar {
    display: flex; gap: 24px; padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .ticker-item { display: flex; flex-direction: column; gap: 2px; min-width: 90px; }
  .ticker-sym { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; color: white; letter-spacing: 1px; }
  .ticker-price { font-size: 14px; color: var(--buy); }
  .ticker-spread { font-size: 10px; color: var(--dim); }

  /* Order book grid */
  .books-container {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    overflow: hidden;
    background: var(--border);
  }
  .book-panel {
    background: var(--surface);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .book-header {
    padding: 10px 14px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .book-sym {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 16px; color: white; letter-spacing: 1px;
  }
  .book-spread {
    font-size: 10px; color: var(--dim);
  }
  .book-cols {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    padding: 5px 10px 4px;
    font-size: 9px; color: var(--dim);
    letter-spacing: 1px; text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }
  .book-cols span:last-child { text-align: right; }
  .book-rows { flex: 1; overflow-y: auto; padding: 0 0 4px; }
  .order-row {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    padding: 4px 10px;
    font-size: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    transition: background 0.2s;
    position: relative;
    overflow: hidden;
    align-items: center;
  }
  .order-row::before {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    left: 0;
    opacity: 0.07;
    pointer-events: none;
  }
  .order-row.buy::before  { background: var(--buy); }
  .order-row.sell::before { background: var(--sell); }
  .order-row.buy  { color: var(--buy); }
  .order-row.sell { color: var(--sell); }
  .order-row.new-anim { animation: rowFlash 0.5s ease; }
  @keyframes rowFlash {
    from { background: rgba(255,209,102,0.2); }
    to   { background: transparent; }
  }
  .order-row span:last-child { text-align: right; font-size: 10px; color: var(--dim); }
  .depth-bar {
    position: absolute; top: 0; bottom: 0; right: 0;
    opacity: 0.12;
    pointer-events: none;
  }
  .depth-bar.buy  { background: var(--buy); }
  .depth-bar.sell { background: var(--sell); }
  .spread-row {
    text-align: center; padding: 5px; font-size: 10px;
    color: var(--gold); background: rgba(255,209,102,0.05);
    border-top: 1px dashed rgba(255,209,102,0.2);
    border-bottom: 1px dashed rgba(255,209,102,0.2);
    letter-spacing: 1px;
  }

  /* Trade tape */
  .tape-panel {
    background: var(--surface);
    border-top: 1px solid var(--border);
    height: 140px;
    display: flex; flex-direction: column;
  }
  .tape-header {
    padding: 6px 14px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-size: 10px; color: var(--dim); letter-spacing: 2px;
    display: flex; align-items: center; gap: 8px;
  }
  .tape-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
  .tape-rows { flex: 1; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; }
  .tape-row {
    display: grid;
    grid-template-columns: 60px 70px 80px 80px 80px 1fr;
    padding: 3px 14px;
    font-size: 11px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    animation: slideIn 0.4s ease;
  }
  @keyframes slideIn { from{transform:translateY(-100%);opacity:0;} to{transform:translateY(0);opacity:1;} }
  .tape-row .t-id    { color: var(--dim); }
  .tape-row .t-sym   { color: white; font-weight: bold; }
  .tape-row .t-price { color: var(--gold); }
  .tape-row .t-qty   { color: var(--text); }
  .tape-row .t-buys  { color: var(--buy); font-size: 10px; }
  .tape-row .t-sells { color: var(--sell); font-size: 10px; margin-left: 8px; }

  /* DSA Visualization */
  .dsa-viz {
    position: fixed; right: 0; bottom: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-left: 1px solid var(--border);
    width: 220px;
    padding: 10px 14px;
    font-size: 10px;
  }
  .dsa-title { color: var(--accent); font-family: 'Barlow Condensed',sans-serif; font-weight:700; font-size:11px; letter-spacing:2px; margin-bottom:8px; }
  .dsa-struct { margin-bottom: 6px; }
  .dsa-struct .name { color: var(--dim); margin-bottom: 2px; }
  .dsa-struct .val  { color: white; background: var(--surface2); padding: 2px 8px; border-radius: 4px; border-left: 2px solid var(--accent); display: inline-block; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">📈</div>
  <div class="header-title">
    <h1>ORDER MATCHING ENGINE</h1>
    <p>Real-Time Stock Exchange Simulator · C++ / DSA</p>
  </div>
  <div class="dsa-badges">
    <span class="badge">MAX-HEAP (BUY)</span>
    <span class="badge">MIN-HEAP (SELL)</span>
    <span class="badge">HASH MAP O(1)</span>
    <span class="badge">PRICE-TIME PRIORITY</span>
  </div>
</div>

<div class="main">
  <!-- LEFT PANEL -->
  <div class="panel-left">
    <div class="panel-section">
      <div class="panel-label">Place Order</div>
      <div class="form-row">
        <div class="form-group">
          <label>SYMBOL</label>
          <select id="sym">
            <option>RELIANCE</option>
            <option>TCS</option>
            <option>INFY</option>
            <option>WIPRO</option>
            <option>HDFC</option>
          </select>
        </div>
        <div class="form-group">
          <label>PRICE (₹)</label>
          <input type="number" id="price" value="2500" step="0.5" min="1">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>QUANTITY</label>
          <input type="number" id="qty" value="100" min="1">
        </div>
        <div class="form-group">
          <label>CANCEL ID</label>
          <input type="number" id="cancelId" placeholder="order #">
        </div>
      </div>
      <div class="btn-group">
        <button class="btn btn-buy"  onclick="placeOrder('BUY')">▲ BUY</button>
        <button class="btn btn-sell" onclick="placeOrder('SELL')">▼ SELL</button>
        <button class="btn btn-cancel" onclick="cancelOrderUI()">✕ CANCEL</button>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-label">Quick Scenarios</div>
      <button class="btn btn-scenario" onclick="runScenario(1)">▶ S1: Full Match (RELIANCE)</button>
      <button class="btn btn-scenario" onclick="runScenario(2)">▶ S2: Partial Fill (TCS)</button>
      <button class="btn btn-scenario" onclick="runScenario(3)">▶ S3: Price-Time Priority (INFY)</button>
      <button class="btn btn-scenario" onclick="runScenario(4)">▶ S4: Cancellation (WIPRO)</button>
      <button class="btn btn-scenario" onclick="runScenario(5)">▶ S5: Multi-Symbol Chaos</button>
    </div>

    <div class="panel-section" style="flex:1;overflow:hidden;display:flex;flex-direction:column;border-bottom:none;">
      <div class="panel-label">Activity Log</div>
      <div class="log-panel" id="logPanel">
        <div class="log-entry log-info"><span class="log-time">--:--:--</span> Engine initialized. Ready.</div>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="panel-right">
    <!-- Ticker bar -->
    <div class="ticker-bar" id="tickerBar"></div>

    <!-- Order books -->
    <div class="books-container" id="booksContainer"></div>

    <!-- Trade tape -->
    <div class="tape-panel">
      <div class="tape-header">
        <div class="tape-dot"></div>
        LIVE TRADE TAPE
      </div>
      <div class="tape-rows" id="tapeTape">
        <div class="tape-row" style="color:var(--dim);font-size:10px;padding:8px 14px;">Waiting for first trade...</div>
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  ENGINE CORE  (mimics C++ implementation)
// ═══════════════════════════════════════════════
let nextOrderId = 0;
let nextTradeId = 0;
const ordersMap = {};   // id → order    (Hash Map)
const books     = {};   // symbol → { bids:[], asks:[] }  (Priority Queues conceptually)
const trades    = [];

const SYMBOLS = ['RELIANCE','TCS','INFY','WIPRO','HDFC'];
const DEFAULT_PRICES = { RELIANCE:2500, TCS:3400, INFY:1500, WIPRO:450, HDFC:1700 };

function getBook(sym) {
  if (!books[sym]) books[sym] = { bids:[], asks:[] };
  return books[sym];
}

// MAX-HEAP for bids: sorted descending by price, then ascending by timestamp
function sortBids(arr) {
  arr.sort((a,b) => b.price - a.price || a.ts - b.ts);
}
// MIN-HEAP for asks: sorted ascending by price, then ascending by timestamp
function sortAsks(arr) {
  arr.sort((a,b) => a.price - b.price || a.ts - b.ts);
}

function placeOrder(side) {
  const sym   = document.getElementById('sym').value;
  const price = parseFloat(document.getElementById('price').value);
  const qty   = parseInt(document.getElementById('qty').value);
  if (isNaN(price)||isNaN(qty)||qty<=0||price<=0) return;

  const id = ++nextOrderId;
  const order = { id, sym, side, price, qty, filled:0, status:'OPEN', ts: Date.now() };
  ordersMap[id] = order;

  const book = getBook(sym);
  if (side==='BUY') book.bids.push(order);
  else              book.asks.push(order);

  addLog(side==='BUY'?'log-buy':'log-sell',
    `ORDER #${id} ${side} ${qty} ${sym} @ ₹${price.toFixed(2)}`);

  matchOrders(sym);
  renderAll();
  return id;
}

function cancelOrderUI() {
  const id = parseInt(document.getElementById('cancelId').value);
  cancelOrder(id);
}

function cancelOrder(id) {
  const o = ordersMap[id];
  if (!o) { addLog('log-cancel', `CANCEL FAILED: Order #${id} not found`); return false; }
  if (o.status==='FILLED'||o.status==='CANCELLED') {
    addLog('log-cancel', `CANCEL FAILED: Order #${id} is ${o.status}`); return false;
  }
  o.status = 'CANCELLED';
  addLog('log-cancel', `ORDER #${id} CANCELLED (${o.side} ${o.qty} ${o.sym} @ ₹${o.price.toFixed(2)})`);
  renderAll();
  return true;
}

function matchOrders(sym) {
  const book = getBook(sym);
  let matched = true;
  while (matched) {
    matched = false;
    // Remove cancelled/filled from front
    sortBids(book.bids);
    sortAsks(book.asks);
    book.bids = book.bids.filter(o => o.status==='OPEN'||o.status==='PARTIALLY_FILLED');
    book.asks = book.asks.filter(o => o.status==='OPEN'||o.status==='PARTIALLY_FILLED');

    if (!book.bids.length || !book.asks.length) break;

    const bestBuy  = book.bids[0];
    const bestSell = book.asks[0];

    if (bestBuy.price < bestSell.price) break;

    // TRADE!
    const tradeQty   = Math.min(bestBuy.qty - bestBuy.filled, bestSell.qty - bestSell.filled);
    const tradePrice = bestSell.price;

    bestBuy.filled  += tradeQty;
    bestSell.filled += tradeQty;

    bestBuy.status  = bestBuy.filled  >= bestBuy.qty  ? 'FILLED' : 'PARTIALLY_FILLED';
    bestSell.status = bestSell.filled >= bestSell.qty ? 'FILLED' : 'PARTIALLY_FILLED';

    const trade = { id:++nextTradeId, sym, buyId:bestBuy.id, sellId:bestSell.id,
                    price:tradePrice, qty:tradeQty, ts:Date.now() };
    trades.unshift(trade);

    addLog('log-trade',
      `✔ TRADE #${trade.id} | ${sym} | Buy#${bestBuy.id} ↔ Sell#${bestSell.id} | ${tradeQty} @ ₹${tradePrice.toFixed(2)}`);

    matched = true;
  }
  sortBids(book.bids);
  sortAsks(book.asks);
}

// ═══════════════════════════════════════════════
//  SCENARIOS
// ═══════════════════════════════════════════════
function runScenario(n) {
  addLog('log-info', `━━━ SCENARIO ${n} STARTED ━━━`);
  const delay = (ms) => new Promise(r => setTimeout(r, ms));
  async function run() {
    if (n===1) {
      // Full match
      placeOrderDirect('RELIANCE','SELL',2500,100);
      await delay(300);
      placeOrderDirect('RELIANCE','BUY',2500,100);
    } else if (n===2) {
      // Partial fill
      placeOrderDirect('TCS','SELL',3400,200);
      await delay(300);
      placeOrderDirect('TCS','BUY',3400,80);
    } else if (n===3) {
      // Price-time priority
      placeOrderDirect('INFY','SELL',1500,50);
      await delay(200);
      placeOrderDirect('INFY','SELL',1510,50);
      await delay(200);
      placeOrderDirect('INFY','SELL',1490,50);   // best ask
      await delay(200);
      placeOrderDirect('INFY','BUY',1510,120);   // matches 1490→1500→1510
    } else if (n===4) {
      // Cancellation
      const id = placeOrderDirect('WIPRO','BUY',450,300);
      await delay(400);
      document.getElementById('cancelId').value = id;
      cancelOrder(id);
    } else if (n===5) {
      // Multi-symbol chaos
      const syms = ['RELIANCE','TCS','INFY','HDFC'];
      for (let i=0;i<8;i++) {
        const s = syms[i%syms.length];
        const base = DEFAULT_PRICES[s];
        const offset = (Math.random()-0.5)*20;
        const side = Math.random()>0.5?'BUY':'SELL';
        placeOrderDirect(s, side, parseFloat((base+offset).toFixed(2)), Math.floor(Math.random()*200+50));
        await delay(250);
      }
    }
  }
  run();
}

function placeOrderDirect(sym, side, price, qty) {
  const id = ++nextOrderId;
  const order = { id, sym, side, price, qty, filled:0, status:'OPEN', ts:Date.now() };
  ordersMap[id] = order;
  const book = getBook(sym);
  if (side==='BUY') book.bids.push(order);
  else              book.asks.push(order);
  addLog(side==='BUY'?'log-buy':'log-sell',
    `ORDER #${id} ${side} ${qty} ${sym} @ ₹${price.toFixed(2)}`);
  matchOrders(sym);
  renderAll();
  return id;
}

// ═══════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════
function renderAll() {
  renderTicker();
  renderBooks();
  renderTape();
}

function renderTicker() {
  const bar = document.getElementById('tickerBar');
  bar.innerHTML = SYMBOLS.map(sym => {
    const book = getBook(sym);
    const activeBids = book.bids.filter(o=>o.status==='OPEN'||o.status==='PARTIALLY_FILLED');
    const activeAsks = book.asks.filter(o=>o.status==='OPEN'||o.status==='PARTIALLY_FILLED');
    const bid = activeBids.length ? activeBids[0].price.toFixed(2) : '--';
    const ask = activeAsks.length ? activeAsks[0].price.toFixed(2) : '--';
    const last = trades.find(t=>t.sym===sym);
    const lastP = last ? last.price.toFixed(2) : DEFAULT_PRICES[sym].toFixed(2);
    return `<div class="ticker-item">
      <span class="ticker-sym">${sym}</span>
      <span class="ticker-price">₹${lastP}</span>
      <span class="ticker-spread">B:${bid} / A:${ask}</span>
    </div>`;
  }).join('');
}

function renderBooks() {
  const container = document.getElementById('booksContainer');
  container.innerHTML = SYMBOLS.slice(0,3).map(sym => {
    const book = getBook(sym);
    const activeBids = book.bids.filter(o=>o.status==='OPEN'||o.status==='PARTIALLY_FILLED').slice(0,6);
    const activeAsks = book.asks.filter(o=>o.status==='OPEN'||o.status==='PARTIALLY_FILLED').slice(0,6);

    const maxQty = Math.max(...[...activeBids,...activeAsks].map(o=>o.qty-o.filled), 1);

    const bid0 = activeBids[0]?.price || 0;
    const ask0 = activeAsks[0]?.price || 0;
    const spread = (bid0 && ask0) ? `SPREAD ₹${(ask0-bid0).toFixed(2)}` : 'SPREAD --';

    const askRows = [...activeAsks].reverse().map(o => {
      const rem = o.qty - o.filled;
      const pct = (rem / maxQty * 100).toFixed(1);
      return `<div class="order-row sell">
        <span>₹${o.price.toFixed(2)}</span>
        <span>${rem}</span>
        <span>#${o.id}</span>
        <div class="depth-bar sell" style="width:${pct}%"></div>
      </div>`;
    }).join('');

    const bidRows = activeBids.map(o => {
      const rem = o.qty - o.filled;
      const pct = (rem / maxQty * 100).toFixed(1);
      return `<div class="order-row buy">
        <span>₹${o.price.toFixed(2)}</span>
        <span>${rem}</span>
        <span>#${o.id}</span>
        <div class="depth-bar buy" style="width:${pct}%"></div>
      </div>`;
    }).join('');

    return `<div class="book-panel">
      <div class="book-header">
        <span class="book-sym">${sym}</span>
        <span class="book-spread">${spread}</span>
      </div>
      <div class="book-cols"><span>PRICE</span><span>QTY</span><span>ID</span></div>
      <div class="book-rows">
        ${askRows}
        <div class="spread-row">── ${spread} ──</div>
        ${bidRows}
        ${activeBids.length===0 && activeAsks.length===0 ? '<div style="color:var(--dim);font-size:11px;text-align:center;padding:20px">No open orders</div>' : ''}
      </div>
    </div>`;
  }).join('');
}

function renderTape() {
  const tape = document.getElementById('tapeTape');
  if (trades.length === 0) return;
  const rows = trades.slice(0,5).map(t => `
    <div class="tape-row">
      <span class="t-id">#${t.id}</span>
      <span class="t-sym">${t.sym}</span>
      <span class="t-price">₹${t.price.toFixed(2)}</span>
      <span class="t-qty">${t.qty} shares</span>
      <span class="t-buys">B#${t.buyId}</span>
      <span class="t-sells">S#${t.sellId}</span>
    </div>`).join('');
  tape.innerHTML = rows;
}

// ═══════════════════════════════════════════════
//  LOG
// ═══════════════════════════════════════════════
function addLog(cls, msg) {
  const panel = document.getElementById('logPanel');
  const time = new Date().toTimeString().slice(0,8);
  const div = document.createElement('div');
  div.className = `log-entry ${cls}`;
  div.innerHTML = `<span class="log-time">${time}</span>${msg}`;
  panel.appendChild(div);
  panel.scrollTop = panel.scrollHeight;
}

// Init
SYMBOLS.forEach(s => getBook(s));
renderAll();
</script>
